<!DOCTYPE html>
<html>
<head>
    <title>실시간 버스 도착 정보</title>
</head>
<body>
    <h1>정류장 {{ station_id }} - 실시간 버스 도착 정보</h1>
    <p><strong>버스 번호:</strong> {{ bus_data.bus_number }}</p>
    <p><strong>도착 예정 시간:</strong> {{ bus_data.arrival_time }}</p>
    <p><strong>차량 번호:</strong> {{ bus_data.vehicle_number }}</p>
    <p><strong>막차 여부:</strong> {{ '예' if bus_data.last_bus == 'Y' else '아니오' }}</p>
</body>
</html>
